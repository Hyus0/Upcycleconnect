services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: upcycletest
    volumes:
      - mysql-data:/var/lib/mysql
      - ../mysql/init:/docker-entrypoint-initdb.d:ro

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ../../mission-1-app/web-app/dist:/usr/share/nginx/html:ro
      - ../../admin/dist:/usr/share/nginx/admin:ro
      - ../server-config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backoffice
      - api-go

  phpmyadmin:
    image: phpmyadmin:5-apache
    ports:
      - "8089:80"
    environment:
      PMA_HOST: ${PMA_HOST:-mysql}
      PMA_PORT: ${PMA_PORT:-3306}
    depends_on:
      - mysql

  backoffice:
    build:
      context: ../../mission-1-app/backoffice
      dockerfile: Dockerfile
    volumes:
      - ../../mission-1-app/backoffice/storage:/var/www/storage

  api-go:
    build:
      context: ../../mission-1-app/api-go
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-upcycletest}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8088,http://localhost:5174}
    volumes:
      - ../../mission-1-app/api-go/storage:/app/storage
    depends_on:
      - mysql

volumes:
  mysql-data:
